global:
  domain: argocd.local
  image:
  

configs:
  params:
    server.insecure: false
    server.basehref: /
    application.instanceLabelKey: argocd.argoproj.io/instance

# ========================
# ArgoCD Server (UI/API)
# ========================
server:
  replicas: 1

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx

    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix

    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/proxy-ssl-verify: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      

  extraArgs:
  extraArgs:
  extraArgs:
    - --insecure
    - --basehref=/
      memory: 512Mi
      cpu: 300m
    requests:
      memory: 256Mi
      cpu: 100m

  persistence:
    enabled: true
    storageClass: nfs-client
    accessModes:
      - ReadWriteMany
    size: 5Gi
    size: 5Gi
# ========================
# Repo Server (Git clone/cache)
# ========================
repoServer:
  replicas: 1

  resources:
    limits:
      memory: 512Mi
      cpu: 300m
    requests:
      memory: 256Mi
      cpu: 100m

  persistence:
    enabled: true
    storageClass: nfs-client
    accessModes:
      - ReadWriteMany
    size: 5Gi

# ========================
# Application Controller
# ========================
controller:
  replicas: 1

  resources:
    limits:
      memory: 1Gi
      cpu: 500m
    requests:
      memory: 512Mi
      cpu: 200m

# ========================
# Redis (internal cache)
# ========================
redis:
  enabled: true

  resources:
    limits:
      memory: 256Mi
      cpu: 200m
    requests:
      memory: 128Mi
      cpu: 50m

  persistence:
    enabled: true
    storageClass: nfs-client
    accessModes:
      - ReadWriteMany
    size: 2Gi

# ========================
# Dex (optional auth)
# ========================
dex:
  # Dex is disabled because external authentication is not planned for this deployment.
  enabled: false

# ========================
# Notifications (optional)
# Notifications are disabled intentionally; enable if notification features are required in your environment.
notifications:
  enabled: false
  enabled: false