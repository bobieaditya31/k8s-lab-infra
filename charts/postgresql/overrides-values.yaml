image:
  registry: docker.io
  repository: bitnami/postgresql
  tag: latest

auth:
  postgresPassword: admin123
  username: myuser
  password: mypassword
  database: mydb

primary:
  persistence:
    enabled: true
    storageClass: nfs-client
    accessModes:
      - ReadWriteOnce
    size: 10Gi

metrics:
  enabled: false

tests:
  enabled: false

service:
  port: 5432