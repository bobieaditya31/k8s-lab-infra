image:
  registry: ghcr.io
  repository: bitnami/postgresql
  tag: 16.3.0

auth:
  postgresPassword: admin123
  username: myuser
  password: mypassword
  database: mydb

primary:
  persistence:
    enabled: true
    storageClass: nfs-client
    accessModes:
      - ReadWriteOnce
    size: 10Gi

service:
  type: ClusterIP
  port: 5432
  ports:
    postgresql: 5432

serviceAccount:
  create: true

metrics:
  enabled: false

tests:
  enabled: false