apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-apps02
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/bobieaditya31/k8s-lab-infra.git
    targetRevision: main
    path: charts/app-template
    helm:
      valueFiles:
        - ../../applications/demo-apps02/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  
  # ⭐ AUTO-SYNC CONFIGURATION
  syncPolicy:
    automated:
      prune: true              # Hapus resource yang tidak ada di Git
      selfHeal: true           # Auto-fix jika ada drift (manual edit di K8s)
      allowEmpty: false        # Jangan allow empty manifest
    
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    
    retry:
      limit: 5                 # Retry 5x jika gagal
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m