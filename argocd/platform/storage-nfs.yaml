apiVersion: v1
kind: PersistentVolume
metadata:
  name: argocd-nfs-pv

spec:
  capacity:
    storage: 5Gi

  accessModes:
    - ReadWriteMany

  persistentVolumeReclaimPolicy: Retain

  nfs:
    path: /data/nfs/argocd
    server: 192.168.1.19

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: argocd-nfs-pvc
  namespace: argocd

spec:
  accessModes:
    - ReadWriteMany

  resources:
    requests:
      storage: 5Gi