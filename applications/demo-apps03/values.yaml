# Cafe Frontend App Configuration
replicaCount: 2

image:
  repository: bobieaditya03/cafe-frontend
  tag: "v14"
  pullPolicy: IfNotPresent

nameOverride: "demo-apps03"
fullnameOverride: "demo-apps03"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: cafe.local
      paths:
        - path: /
          pathType: Prefix
          
persistence:
  enabled: false             # Frontend tidak perlu persistence

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10