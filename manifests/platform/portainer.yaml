apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portainer
  namespace: argocd

spec:
  project: my-homelab

  sources:
    - repoURL: https://github.com/bobieaditya31/k8s-lab-infra/
      path: charts/portainer
      targetRevision: main

      helm:
        releaseName: portainer
        valueFiles:
          - overrides-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: portainer

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
