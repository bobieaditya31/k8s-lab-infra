apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: "15"

    helm:
      values: |
        auth:
          postgresPassword: admin123
          username: myuser
          password: mypassword
          database: mydb
        primary:
          persistence:
            enabled: true
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 10Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: database

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true